<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kratak uvid</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f1ea;
      color: #2f2a26;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: #fffdf9;
      border: 1px solid #e8dfd2;
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      text-align: center;
      margin-top: 40px;
      margin-bottom: 40px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.3;
    }

    .intro {
      margin: 0 auto 24px;
      max-width: 500px;
      font-size: 16px;
      line-height: 1.7;
      color: #5a5148;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border: 1px solid #d8cdbf;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      background: #fff;
      color: #2f2a26;
    }

    textarea:focus {
      border-color: #bca58a;
      box-shadow: 0 0 0 3px rgba(188, 165, 138, 0.15);
    }

    button {
      margin-top: 16px;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #7a5c43;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #684d38;
    }

    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 14px;
      background: #f8f3ec;
      border: 1px solid #e6dbce;
      text-align: left;
      line-height: 1.8;
      font-size: 16px;
      color: #3a342f;
      display: none;
      max-height: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    .cta {
      display: inline-block;
      margin-top: 18px;
      color: #7a5c43;
      font-weight: 600;
      text-decoration: none;
    }

    .cta:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px 18px;
      }

      h1 {
        font-size: 24px;
      }

      .intro,
      textarea,
      .result,
      button {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Kratak uvid</h1>
      <p class="intro">
        Napiši jednom rečenicom šta ti se u poslednje vreme ponavlja.
Ponekad je dovoljno da se obrazac napiše, da bi počeo da se vidi jasnije.
      </p>

      <textarea id="q" placeholder="Na primer: imam osećaj da se stalno vraćam u iste situacije i ne znam zašto"></textarea>

      <button onclick="showInsight()">Pogledaj početni uvid</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <script>

function showInsight() {

  const result = document.getElementById("result");

  const texts = [

"Ono što se u životu ponavlja često nije slučajno, već deo obrasca koji još nije potpuno sagledan.<br><br>Kada se iste situacije vraćaju kroz različite okolnosti, to obično znači da se nalaziš u određenoj etapi svog ličnog ciklusa i da iskustvo pokušava da se razume na dubljem nivou.<br><br>Ovaj prikaz može pokazati pravac, ali ne daje celu sliku.<br><br>Za precizniji lični uvid potrebno je sagledati ceo ciklus.",

"Ponavljanje istih situacija obično znači da se iskustvo kreće kroz obrazac koji još nije do kraja primećen.<br><br>Kada se nešto vraća u različitim oblicima, to često pokazuje da se nalaziš u periodu u kome je potrebno sagledati širu sliku svog ciklusa.<br><br>Kratak prikaz može dati smer, ali ne i potpun uvid.<br><br>Za precizniji lični uvid potrebno je sagledati ceo ciklus.",

"Kada se određene okolnosti stalno vraćaju, to obično nije slučajnost već znak da se iskustvo odvija kroz određenu fazu ličnog ciklusa.<br><br>Obrazac se često vidi tek kada se zastane i pogleda šira slika.<br><br>Ovaj kratki prikaz pokazuje pravac, ali ne otkriva ceo tok.<br><br>Za dublji lični uvid potrebno je sagledati ceo ciklus.",

"Osećaj da se iste situacije ponavljaju najčešće znači da postoji obrazac koji još nije potpuno razjašnjen.<br><br>Kada se iskustvo kreće kroz isti krug, to može pokazivati da se nalaziš u određenoj etapi ličnog razvoja.<br><br>Kratak uvid može pokazati smer, ali ne i celu sliku.<br><br>Za precizniji prikaz potrebno je sagledati ceo ciklus.",

"Ponavljanje u životu često ukazuje na to da se određeni deo iskustva još nije sagledao iz pravog ugla.<br><br>Kada se slične situacije vraćaju, to može značiti da se nalaziš u fazi ciklusa koja traži dublje razumevanje.<br><br>Ovaj prikaz daje početni pravac, ali ne pokazuje ceo tok.<br><br>Za potpun lični uvid potrebno je sagledati ceo ciklus."

];

  const random = Math.floor(Math.random() * texts.length);

  const text = texts[random];

  result.innerHTML =
  "<b>Početni uvid</b><br><br>" +
  text +
  "<br><br><a class='cta' href='https://uvid.unlocktheessence.com/' target='_blank'>Otvori dublji lični uvid</a>";

  result.style.display = "block";

}

</script>
</body>
</html>
